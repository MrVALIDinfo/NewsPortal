services:
  - type: web
    name: newsportal-monolith
    env: docker
    dockerContext: .
    dockerfile: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    # No custom disk needed if you don't mind data being reset
